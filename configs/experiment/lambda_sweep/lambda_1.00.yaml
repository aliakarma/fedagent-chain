# Lambda fairness sweep: lambda=1.00
defaults:
  - /default

experiment:
  name: lambda_sweep_1.00
  description: "Lambda fairness sweep: lambda=1.00"
  variant: lambda_sweep

seed: 42

federated:
  n_rounds: 20
  min_clients: 4
  local_epochs: 5
  batch_size: 32
  learning_rate: 0.01

privacy:
  enabled: true
  clipping_threshold: 1.0
  noise_multiplier: 1.1

fairness:
  enabled: true
  lambda_fairness: 1.00
  protected_groups:
    - disability_category
    - language_primary
    - preferred_work_mode
    - node_id

blockchain:
  enabled: false

data:
  n_users_per_node: 2500
  n_jobs_per_node: 1250
  n_pairs_per_node: 12500
