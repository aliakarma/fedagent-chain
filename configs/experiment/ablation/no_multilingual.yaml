# Ablation: Full system without the multilingual communication agent
# The multilingual agent operates at the service layer and does not alter
# federated F1 or on-chain metrics; its contribution is measured separately
# via language-support adequacy (paper Table: agent_results).
# Self-contained config (load_config does not compose `defaults:`).

experiment:
  name: ablation_no_multilingual
  description: "Ablation — full system with the multilingual agent disabled"
  variant: ablation_no_multilingual

seed: 42

federated:
  n_rounds: 20
  min_clients: 4
  local_epochs: 5
  batch_size: 32
  learning_rate: 0.01

privacy:
  enabled: true
  clipping_threshold: 1.0
  noise_multiplier: 1.1

fairness:
  enabled: true
  lambda_fairness: 0.50
  protected_groups:
    - disability_category
    - language_primary
    - preferred_work_mode
    - node_id

blockchain:
  enabled: true
  records_per_block: 10

agents:
  multilingual:
    enabled: false          # Ablated service-layer component

data:
  n_users_per_node: 2500
  n_jobs_per_node: 1250
  n_pairs_per_node: 12500
