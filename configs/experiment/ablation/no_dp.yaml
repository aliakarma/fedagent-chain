# Ablation: Full system without differential privacy
# Measures the price of the formal (epsilon, delta)-DP guarantee on F1.
# Self-contained config (load_config does not compose `defaults:`).

experiment:
  name: ablation_no_dp
  description: "Ablation — full FedAgent-Chain with differential privacy disabled"
  variant: ablation_no_dp

seed: 42

federated:
  n_rounds: 20
  min_clients: 4
  local_epochs: 5
  batch_size: 32
  learning_rate: 0.01

privacy:
  enabled: false          # Ablated component (no clipping / no Gaussian noise)
  clipping_threshold: 1.0
  noise_multiplier: 1.1

fairness:
  enabled: true
  lambda_fairness: 0.50
  protected_groups:
    - disability_category
    - language_primary
    - preferred_work_mode
    - node_id

blockchain:
  enabled: true
  records_per_block: 10

data:
  n_users_per_node: 2500
  n_jobs_per_node: 1250
  n_pairs_per_node: 12500
